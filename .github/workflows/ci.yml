name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv init
      - run: uv lock
      - run: uv sync --frozen
      - run: uvx run ruff check src/
      - run: uvx run ruff format --check src/
      - run: |
          uv pip install pytest
          uv run pytest
